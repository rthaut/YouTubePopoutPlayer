name: nextrelease
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [labeled, unlabeled, edited, synchronize]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.head_ref == 'nextrelease') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          package-manager-cache: false
      - uses: dropseed/nextrelease@v1
        with:
          prepare_cmd: |
            sed -i -e "s/v$LAST_VERSION/v$NEXT_VERSION/g" README.md
            npm version $NEXT_VERSION --no-git-tag-version --allow-same-version
          publish_cmd: |
            git tag -a v$VERSION_MAJOR -m Version $VERSION_MAJOR -f && git push origin v$VERSION_MAJOR -f
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          next_branch: nextrelease
      - name: Sync GitHub release from changelog
        if: ${{ github.event_name == 'push' && startsWith(github.event.head_commit.message, 'Release version ') }}
        uses: dropseed/changerelease@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          changelog: CHANGELOG.md
