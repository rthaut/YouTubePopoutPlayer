name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint:workflows
      - run: npm run lint:styles
      - run: npm run compile
      - run: npm run lint
      - run: npm run test:unit
